<svg width="250" height="250" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect x="0" y="0" width="250" height="225" fill="#87CEEB" opacity="0"/>
  
  <!-- Ground Platform - Green -->
  <rect x="0" y="225" width="250" height="25" fill="#228B22" stroke="#1a6b1a" stroke-width="2" rx="2"/>
  
  <!-- Level 1: Getting Started - Simple ascending platforms -->
  <rect x="40" y="195" width="60" height="12" fill="#8B7355" stroke="#654321" stroke-width="1" rx="2"/>
  <rect x="110" y="165" width="60" height="12" fill="#8B7355" stroke="#654321" stroke-width="1" rx="2"/>
  <rect x="165" y="135" width="60" height="12" fill="#8B7355" stroke="#654321" stroke-width="1" rx="2"/>
  <rect x="150" y="105" width="60" height="12" fill="#8B7355" stroke="#654321" stroke-width="1" rx="2"/>
  <rect x="125" y="75" width="60" height="12" fill="#8B7355" stroke="#654321" stroke-width="1" rx="2"/>
  <rect x="165" y="45" width="60" height="12" fill="#8B7355" stroke="#654321" stroke-width="1" rx="2"/>
  
  <!-- Coins - not on platforms, scattered in air -->
  <circle cx="75" cy="155" r="3.5" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
  <circle cx="145" cy="125" r="3.5" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
  <circle cx="200" cy="95" r="3.5" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
  <circle cx="185" cy="65" r="3.5" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
  <circle cx="145" cy="45" r="3.5" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
  
  <!-- Goal - Small Star at top right -->
  <g id="goal">
    <polygon points="195,30 198,36 205,36 200,40 202,46 195,42 188,46 190,40 185,36 192,36" fill="#FFD700" stroke="#FFA500" stroke-width="0.8"/>
  </g>
  
  <!-- Player character on ground - default sprite (rectangle with eyes) -->
  <g id="player">
    <!-- Body (rectangle) -->
    <rect x="10" y="205" width="25" height="35" fill="#FF6B6B" stroke="#333" stroke-width="0.5"/>
    <!-- Eyes (white rectangles) -->
    <rect x="15" y="215" width="4" height="4" fill="white"/>
    <rect x="29" y="215" width="4" height="4" fill="white"/>
    <!-- Pupils (black, offset to right showing direction) -->
    <rect x="17" y="216" width="2" height="2" fill="black"/>
    <rect x="31" y="216" width="2" height="2" fill="black"/>
  </g>
  
  <!-- Decorative clouds -->
  <g id="cloud1" opacity="0.7">
    <ellipse cx="30" cy="30" rx="12" ry="8" fill="white"/>
    <ellipse cx="40" cy="32" rx="11" ry="7" fill="white"/>
    <ellipse cx="20" cy="34" rx="10" ry="7" fill="white"/>
  </g>
  
  <g id="cloud2" opacity="0.7">
    <ellipse cx="85" cy="50" rx="13" ry="8" fill="white"/>
    <ellipse cx="97" cy="52" rx="12" ry="7" fill="white"/>
    <ellipse cx="73" cy="54" rx="11" ry="7" fill="white"/>
  </g>
</svg>
